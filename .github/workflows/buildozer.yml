name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openjdk-17-jdk-headless
          pip install buildozer cython 2>&1

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer --version 2>&1 | tee build.log
          echo y | buildozer android debug 2>&1 | tee -a build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
