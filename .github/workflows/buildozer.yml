name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git zip unzip
          pip install buildozer cython

      - name: Build
        run: |
          java -version
          which python
          python -c "import buildozer; print('buildozer ok')"
          cd ${{ github.workspace }}
          yes | python -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: |
            bin/*.apk
            *.apk
