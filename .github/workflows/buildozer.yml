name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-dev python3-venv \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev libreadline-dev \
            cmake ninja-build ccache \
            openjdk-17-jdk-headless

      - name: Install buildozer
        run: |
          python3 -m venv ~/buildozer-venv
          ~/buildozer-venv/bin/pip install --upgrade pip setuptools wheel
          ~/buildozer-venv/bin/pip install buildozer cython

      - name: Build APK
        run: |
          cd ${{ github.workspace }}
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$PATH:$HOME/buildozer-venv/bin
          ~/buildozer-venv/bin/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: |
            ${{ github.workspace }}/bin/*.apk
            ${{ github.workspace }}/bin/*.aab
