name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK (Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w /work \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug 2>&1"
          echo "=== 检查 APK ==="
          ls -la ${{ github.workspace }}/bin/ || echo "bin/ 不存在"
          find ${{ github.workspace }} -name "*.apk" -type f 2>/dev/null || echo "未找到 APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: warn
