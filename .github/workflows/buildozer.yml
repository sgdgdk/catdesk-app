name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openjdk-17-jdk-headless git zip unzip
          pip install buildozer cython

      - name: Build
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          python -c "import buildozer; print('ok')"
          yes | python -m buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: bin/*.apk
