name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 手动触发

env:
  JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用 22.04 兼容性更好
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libffi-dev libssl-dev \
            libltdl-dev libsqlite3-dev libbz2-dev libgdbm-dev \
            libreadline-dev uuid-dev lzma-dev tk-dev \
            python3-pip python3-venv python3-dev \
            cmake ninja-build ccache \
            openjdk-17-jdk-headless \
            libgomp1
          # 设置 JAVA_HOME
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" | sudo tee -a /etc/environment

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Set up Python venv and install buildozer
        run: |
          python3 -m venv ~/venv
          source ~/venv/bin/activate
          pip install --upgrade pip setuptools wheel cython
          pip install buildozer

      - name: Build APK with buildozer
        run: |
          source ~/venv/bin/activate
          export PATH=$PATH:~/.local/bin
          cd ${{ github.workspace }}
          # 确保 target 架构
          python3 -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: |
            ${{ github.workspace }}/bin/*.apk
            ${{ github.workspace }}/bin/*.aab
