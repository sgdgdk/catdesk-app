name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          for i in 1 2 3; do
            docker pull kivy/buildozer:latest && break
            echo "Docker pull failed, retry $i..."
            sleep 10
          done
          docker run --rm -v $(pwd):/work -w /work \
            kivy/buildozer:latest \
            bash -c "yes | buildozer -v android debug 2>&1"

      - name: Upload APK
        run: |
          mkdir -p upload
          find $(pwd) -name "*.apk" -type f -exec cp {} upload/ \;
          ls -la upload/

      - uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: upload/*.apk
