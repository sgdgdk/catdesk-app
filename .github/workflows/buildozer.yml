name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install buildozer
        run: |
          sudo apt update -qq
          sudo apt install -y -qq python3-pip python3-dev openjdk-17-jdk-headless \
            git zip unzip pkg-config zlib1g-dev libssl-dev libffi-dev \
            libncurses5-dev libsqlite3-dev cmake ccache
          sudo pip3 install buildozer cython --break-system-packages -q
          echo "=== check ==="
          python3 -c "import buildozer; print('buildozer', buildozer.__version__)" 2>&1

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          cd ${{ github.workspace }}
          python3 -c "import buildozer; print('ready')" 2>&1
          yes | python3 -m buildozer android debug 2>&1
          ls -la bin/ 2>/dev/null || echo "no bin dir"
          find . -name "*.apk" -type f 2>/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: "**/*.apk"
