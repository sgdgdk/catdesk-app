name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install buildozer
        run: |
          sudo apt update -qq
          sudo apt install -y -qq python3-pip python3-venv openjdk-17-jdk-headless
          python3 -m venv ~/venv
          ~/venv/bin/pip install --quiet buildozer cython

      - name: Check buildozer
        run: ~/venv/bin/python -m buildozer --version

      - name: Build debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          cd ${{ github.workspace }}
          ~/venv/bin/python -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: "bin/*.apk"
