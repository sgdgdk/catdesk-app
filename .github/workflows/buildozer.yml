name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install buildozer & deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq python3-pip python3-dev python3-venv \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev libreadline-dev \
            cmake ninja-build ccache \
            openjdk-17-jdk-headless 2>&1 | tail -3
          python3 -m venv ~/venv
          ~/venv/bin/pip install -q --upgrade pip setuptools wheel cython buildozer 2>&1 | tail -3

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          cd ${{ github.workspace }}
          $HOME/venv/bin/python -c "import buildozer; print('buildozer OK:', buildozer.__version__)"
          yes | $HOME/venv/bin/python -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: |
            ${{ github.workspace }}/bin/*.apk
