name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK (Docker)
        run: |
          # 重试拉取 Docker 镜像
          for i in 1 2 3; do
            docker pull kivy/buildozer:latest && break
            echo "拉取失败，重试第 $i 次..."
            sleep 5
          done
          docker run --rm -v ${{ github.workspace }}:/work -w /work \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug 2>&1"
          echo "=== 查找 APK ==="
          find ${{ github.workspace }}/bin -name "*.apk" -type f 2>/dev/null | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskCat-APK
          path: ${{ github.workspace }}/bin/*.apk
          if-no-files-found: warn
